name: GuardQL on CRuby master

on:
  workflow_dispatch:
    inputs:
      query_timeout_minutes:
        description: Per-query timeout in minutes; defaults to GUARDQL_QUERY_TIMEOUT_MINUTES or 45.
        required: false
        type: number
  schedule:
    # GitHub schedules use UTC. The interval gate below makes this daily
    # schedule configurable through GUARDQL_INTERVAL_DAYS.
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: guardql-cruby-master
  cancel-in-progress: false

jobs:
  cadence:
    name: Check cadence
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      interval_days: ${{ steps.gate.outputs.interval_days }}
      epoch_days: ${{ steps.gate.outputs.epoch_days }}
    env:
      GUARDQL_INTERVAL_DAYS: ${{ vars.GUARDQL_INTERVAL_DAYS || '1' }}
    steps:
      - name: Decide whether to run
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          interval="${GUARDQL_INTERVAL_DAYS:-1}"
          if ! [[ "$interval" =~ ^[1-9][0-9]*$ ]]; then
            echo "::warning::GUARDQL_INTERVAL_DAYS must be a positive integer; using 1."
            interval=1
          fi

          epoch_days=$(( $(date -u +%s) / 86400 ))

          if [[ "$GITHUB_EVENT_NAME" != "schedule" ]]; then
            should_run=true
            echo "Manual run requested; cadence gate is bypassed."
          elif (( epoch_days % interval == 0 )); then
            should_run=true
            echo "Scheduled run is due: epoch_days=${epoch_days}, interval_days=${interval}."
          else
            should_run=false
            echo "Scheduled run skipped: epoch_days=${epoch_days}, interval_days=${interval}."
          fi

          {
            echo "should_run=${should_run}"
            echo "interval_days=${interval}"
            echo "epoch_days=${epoch_days}"
          } >> "$GITHUB_OUTPUT"

  scan:
    name: Run GuardQL queries
    needs: cadence
    if: needs.cadence.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CRUBY_ROOT: ${{ github.workspace }}/cruby
      DB_DIR: ${{ github.workspace }}/guardql-work/cruby-codeql-db
      QUERY_ROOT: ${{ github.workspace }}/guardlint/codeql-custom-queries-cpp
      QUERY_TIMEOUT_MINUTES: ${{ inputs.query_timeout_minutes || vars.GUARDQL_QUERY_TIMEOUT_MINUTES || '45' }}
      RESULTS_DIR: ${{ github.workspace }}/guardql-results
    steps:
      - name: Check out guardlint
        uses: actions/checkout@v6
        with:
          path: guardlint

      - name: Check out CRuby master
        uses: actions/checkout@v6
        with:
          repository: ruby/ruby
          ref: master
          path: cruby
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare result directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            "$(dirname "$DB_DIR")" \
            "$RESULTS_DIR/bqrs" \
            "$RESULTS_DIR/csv" \
            "$RESULTS_DIR/info" \
            "$RESULTS_DIR/logs/database-create" \
            "$RESULTS_DIR/logs/queries"

          git -C "$CRUBY_ROOT" rev-parse HEAD > "$RESULTS_DIR/cruby-sha.txt"
          git -C "$CRUBY_ROOT" log -1 --date=iso-strict \
            --format='commit=%H%ncommit_date=%cd%nsubject=%s' \
            > "$RESULTS_DIR/cruby-head.txt"

          {
            echo "event_name=${GITHUB_EVENT_NAME}"
            echo "interval_days=${{ needs.cadence.outputs.interval_days }}"
            echo "epoch_days=${{ needs.cadence.outputs.epoch_days }}"
            echo "query_timeout_minutes=${QUERY_TIMEOUT_MINUTES}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          } > "$RESULTS_DIR/run-metadata.txt"

      - name: Install CRuby build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            bison \
            build-essential \
            curl \
            jq \
            libdb-dev \
            libffi-dev \
            libgdbm-compat-dev \
            libgdbm-dev \
            libgmp-dev \
            libncurses-dev \
            libreadline-dev \
            libssl-dev \
            libyaml-dev \
            pkg-config \
            ruby \
            uuid-dev \
            zlib1g-dev

      - name: Install CodeQL CLI
        shell: bash
        run: |
          set -euo pipefail
          bundle="$RUNNER_TEMP/codeql-bundle-linux64.tar.gz"
          curl -fsSL \
            https://github.com/github/codeql-action/releases/latest/download/codeql-bundle-linux64.tar.gz \
            -o "$bundle"
          tar -xzf "$bundle" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/codeql" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/codeql/codeql" version

      - name: Configure CRuby
        shell: bash
        working-directory: cruby
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure --disable-install-doc --disable-yjit --prefix="$PWD/.install"

      - name: Build CRuby CodeQL database
        shell: bash
        working-directory: cruby
        run: |
          set -euo pipefail
          codeql database create "$DB_DIR" \
            --language=cpp \
            --source-root="$CRUBY_ROOT" \
            --command="make -j$(nproc)" \
            --overwrite \
            --logdir="$RESULTS_DIR/logs/database-create"

      - name: Discover GuardQL query set
        shell: bash
        run: |
          set -euo pipefail
          missing_query="$QUERY_ROOT/missing_guards.ql"

          if [[ ! -f "$missing_query" ]]; then
            echo "::error::missing_guards.ql is required for fail-on-missing reporting."
            exit 1
          fi

          {
            echo "$missing_query"
            find "$QUERY_ROOT" -maxdepth 1 -type f -name '*.ql' \
              ! -name '*_detail.ql' \
              ! -name 'missing_guards.ql' \
              | sort
          } > "$RESULTS_DIR/query-list.txt"

          echo "Selected queries:"
          sed 's#^#- #' "$RESULTS_DIR/query-list.txt"

      - name: Run GuardQL queries
        id: run-queries
        shell: bash
        run: |
          set -euo pipefail

          echo "query,row_count" > "$RESULTS_DIR/row-counts.csv"
          echo "query,status,exit_code" > "$RESULTS_DIR/query-status.csv"
          missing_rows=0
          missing_status=not_run
          missing_exit_code=0

          query_timeout_minutes="${QUERY_TIMEOUT_MINUTES:-45}"
          if ! [[ "$query_timeout_minutes" =~ ^[1-9][0-9]*$ ]]; then
            echo "::warning::QUERY_TIMEOUT_MINUTES must be a positive integer; using 45."
            query_timeout_minutes=45
          fi
          query_timeout_seconds=$(( query_timeout_minutes * 60 ))
          echo "Per-query timeout: ${query_timeout_minutes} minute(s)."

          while IFS= read -r query; do
            name="$(basename "$query" .ql)"
            bqrs="$RESULTS_DIR/bqrs/${name}.bqrs"
            csv="$RESULTS_DIR/csv/${name}.csv"
            info="$RESULTS_DIR/info/${name}.json"
            log="$RESULTS_DIR/logs/queries/${name}.log"

            {
              echo "query=${query}"
              echo "bqrs=${bqrs}"
              echo "csv=${csv}"
              echo
            } > "$log"

            echo "::group::Run ${name}"
            set +e
            timeout --kill-after=60s "${query_timeout_seconds}s" \
              codeql query run "$query" \
              --database="$DB_DIR" \
              --threads=0 \
              --ram=12000 \
              --output="$bqrs" \
              2>&1 | tee -a "$log"
            query_exit_code=${PIPESTATUS[0]}
            set -e

            if [[ "$query_exit_code" -ne 0 ]]; then
              if [[ "$query_exit_code" -eq 124 || "$query_exit_code" -eq 137 ]]; then
                query_status=timed_out
                echo "::warning::${name} timed out after ${query_timeout_minutes} minute(s)."
              else
                query_status=failed
                echo "::warning::${name} failed with exit code ${query_exit_code}."
              fi

              printf '%s,%s\n' "$name" 0 >> "$RESULTS_DIR/row-counts.csv"
              printf '%s,%s,%s\n' "$name" "$query_status" "$query_exit_code" \
                >> "$RESULTS_DIR/query-status.csv"
              if [[ "$name" == "missing_guards" ]]; then
                missing_status="$query_status"
                missing_exit_code="$query_exit_code"
                echo "::endgroup::"
                break
              fi

              echo "::endgroup::"
              continue
            fi

            codeql bqrs decode \
              --format=csv \
              --output="$csv" \
              -- "$bqrs" \
              2>&1 | tee -a "$log"

            codeql bqrs info --format=json -- "$bqrs" > "$info"
            row_count="$(
              jq -r '
                def result_sets:
                  if has("result-sets") then ."result-sets"
                  elif has("resultSets") then .resultSets
                  else [] end;
                result_sets
                | if type == "array" then .
                  elif type == "object" then [.[]]
                  else [] end
                | map((.rows // .tuples // .rowCount // .count // 0) | tonumber)
                | add // 0
              ' "$info"
            )"

            printf '%s,%s\n' "$name" "$row_count" >> "$RESULTS_DIR/row-counts.csv"
            printf '%s,success,0\n' "$name" >> "$RESULTS_DIR/query-status.csv"
            if [[ "$name" == "missing_guards" ]]; then
              missing_rows="$row_count"
              missing_status=success
            fi

            echo "${name}: ${row_count} row(s)"
            echo "::endgroup::"
          done < "$RESULTS_DIR/query-list.txt"

          echo "missing_rows=${missing_rows}" >> "$GITHUB_OUTPUT"
          echo "missing_status=${missing_status}" >> "$GITHUB_OUTPUT"
          echo "missing_exit_code=${missing_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Fail if missing guards were found
        if: steps.run-queries.outputs.missing_status != 'success' || steps.run-queries.outputs.missing_rows != '0'
        shell: bash
        run: |
          if [[ "${{ steps.run-queries.outputs.missing_status }}" != "success" ]]; then
            echo "::error::missing_guards.ql did not complete: status=${{ steps.run-queries.outputs.missing_status }}, exit_code=${{ steps.run-queries.outputs.missing_exit_code }}."
          else
            echo "::error::missing_guards.ql reported ${{ steps.run-queries.outputs.missing_rows }} row(s) on CRuby master."
          fi
          exit 1

      - name: Upload GuardQL artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: guardql-cruby-master-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.RESULTS_DIR }}
          if-no-files-found: warn
          retention-days: 30
